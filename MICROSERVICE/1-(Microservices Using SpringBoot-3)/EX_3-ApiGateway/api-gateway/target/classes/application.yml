server:
  port: 8083

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: customer-service
          uri: http://localhost:8081
          predicates:
            - Path=/customer,/customer/**
          filters:
            - RewritePath=/customer/?(?<segment>.*), /customers/${segment}

        - id: billing-service
          uri: http://localhost:8082
          predicates:
            - Path=/bill,/bill/**
          filters:
            - RewritePath=/bill/?(?<segment>.*), /billing/${segment}